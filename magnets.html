<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Back on Track — printable fridge magnets</title>
    <style>
      :root {
        --green: #2e7d32;
        --blue: #1565c0;
        --amber: #e36209;
        --purple: #6a1b9a;
        --red: #c62828;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        background: #eef0f3;
        color: #1a1a1a;
      }

      /* On-screen control bar (hidden when printing) */
      .bar {
        background: #1a1a1a;
        color: #fff;
        padding: 14px 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }
      .bar h1 { font-size: 16px; margin: 0 12px 0 0; }
      .bar label { font-size: 13px; opacity: 0.85; }
      .bar input {
        flex: 1;
        min-width: 220px;
        padding: 9px 12px;
        border-radius: 8px;
        border: 0;
        font-size: 14px;
      }
      .bar button {
        background: #fff;
        color: #1a1a1a;
        border: 0;
        border-radius: 8px;
        padding: 9px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .langsel { flex-basis: 100%; display: flex; align-items: center; gap: 8px; }
      .langsel .lbl { font-size: 13px; opacity: 0.85; }
      .langbtn { background: #333; color: #fff; border: 1px solid #555; }
      .langbtn.active { background: #fff; color: #1a1a1a; }
      .bar .hint { flex-basis: 100%; font-size: 12px; opacity: 0.7; }

      .sheet {
        display: grid;
        grid-template-columns: repeat(2, 60mm);
        gap: 10mm;
        justify-content: center;
        padding: 14mm 0;
      }

      /* One magnet = 60mm square: colour headline on top, white QR panel below */
      .magnet {
        width: 60mm;
        height: 60mm;
        border-radius: 6mm;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        border: 1.5mm solid var(--c);
      }
      .magnet .head { background: var(--c); color: #fff; padding: 4mm 4mm 3mm; flex: 0 0 auto; }
      .magnet .head .title { font-size: 6.4mm; font-weight: 800; line-height: 1.05; }
      .magnet .head .sub { font-size: 3.2mm; font-weight: 600; opacity: 0.95; margin-top: 1mm; }
      .magnet .panel { background: #fff; flex: 1; display: flex; align-items: center; justify-content: center; gap: 3mm; padding: 2mm 3mm 3mm; }
      .magnet .qr { width: 26mm; height: 26mm; }
      .magnet .qr svg { width: 100%; height: 100%; display: block; }
      .magnet .scan { font-size: 3mm; color: #444; line-height: 1.2; }
      .magnet .scan b { color: var(--c); display: block; font-size: 3.4mm; }

      .magnet.green { --c: var(--green); }
      .magnet.blue { --c: var(--blue); }
      .magnet.amber { --c: var(--amber); }
      .magnet.purple { --c: var(--purple); }
      .magnet.red { --c: var(--red); }

      @media print {
        .bar { display: none; }
        body { background: #fff; }
        .sheet { padding: 8mm; }
        .magnet { box-shadow: none; }
        * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1>Fridge magnets</h1>
      <label for="base">App address:</label>
      <input id="base" type="text" />
      <button id="apply">Update QR codes</button>
      <button id="print">Print / Save PDF</button>
      <div class="langsel">
        <span class="lbl">Taal / Language:</span>
        <button id="langEn" class="langbtn">English</button>
        <button id="langNl" class="langbtn">Nederlands</button>
      </div>
      <p class="hint">
        Pick a language, then Print / Save PDF. Each QR opens the matching section of the app
        in that language. The app address is already set to the live site.
      </p>
    </div>

    <div class="sheet" id="sheet"></div>

    <script src="vendor/qrcode.js"></script>
    <script>
      // Live app address. Change only if you move the app elsewhere.
      var BASE_URL = "https://voyagi.github.io/back-on-track/";

      // Each language: the "scan" label + the five magnets (colour/route match the app).
      var DATA = {
        en: {
          scan: { a: "Scan me", b: "with your<br>phone camera" },
          magnets: [
            { c: "green", route: "today", title: "Move a little, often", sub: "Today's gentle exercises" },
            { c: "blue", route: "learn", title: "Hurt isn't harm", sub: "Understand your back" },
            { c: "amber", route: "flare", title: "Bad day?", sub: "Open your flare-up plan" },
            { c: "purple", route: "goal", title: "Remember your why", sub: "Your goal" },
            { c: "red", route: "safety", title: "When to get checked", sub: "Warning signs" },
          ],
        },
        nl: {
          scan: { a: "Scan mij", b: "met je<br>telefooncamera" },
          magnets: [
            { c: "green", route: "today", title: "Beweeg een beetje, vaak", sub: "Oefeningen van vandaag" },
            { c: "blue", route: "learn", title: "Pijn is geen schade", sub: "Begrijp je rug" },
            { c: "amber", route: "flare", title: "Slechte dag?", sub: "Open je opvlamming-plan" },
            { c: "purple", route: "goal", title: "Weet weer waarom", sub: "Jouw doel" },
            { c: "red", route: "safety", title: "Wanneer naar de dokter", sub: "Waarschuwingstekens" },
          ],
        },
      };
      var lang = "en";

      function linkFor(route) {
        var base = BASE_URL.trim();
        if (!/\/$/.test(base) && !/\.html$/.test(base)) base += "/";
        // ?lang= makes the app open in the magnet's language even on a foreign-language phone.
        return base + "?from=magnet&lang=" + lang + "#/" + route;
      }

      function qrSvg(url) {
        // Q error correction (25%) keeps the QR robust but less dense than H, so the
        // modules stay big enough to scan at ~26mm print size. margin 2 = a proper quiet zone.
        var qr = qrcode(0, "Q");
        qr.addData(url);
        qr.make();
        return qr.createSvgTag({ cellSize: 2, margin: 2, scalable: true });
      }

      function render() {
        var d = DATA[lang];
        document.getElementById("sheet").innerHTML = d.magnets
          .map(function (m) {
            return (
              '<div class="magnet ' + m.c + '">' +
              '<div class="head"><div class="title">' + m.title + "</div>" +
              '<div class="sub">' + m.sub + "</div></div>" +
              '<div class="panel"><div class="qr">' + qrSvg(linkFor(m.route)) + "</div>" +
              '<div class="scan"><b>' + d.scan.a + "</b>" + d.scan.b + "</div></div>" +
              "</div>"
            );
          })
          .join("");
        document.getElementById("langEn").classList.toggle("active", lang === "en");
        document.getElementById("langNl").classList.toggle("active", lang === "nl");
      }

      // ?base= and ?lang= overrides so it can be set without editing the file.
      var params = new URLSearchParams(location.search);
      if (params.get("base")) BASE_URL = params.get("base");
      if (params.get("lang") === "nl" || params.get("lang") === "en") lang = params.get("lang");
      document.getElementById("base").value = BASE_URL;

      document.getElementById("apply").addEventListener("click", function () {
        BASE_URL = document.getElementById("base").value || BASE_URL;
        render();
      });
      document.getElementById("print").addEventListener("click", function () { window.print(); });
      document.getElementById("langEn").addEventListener("click", function () { lang = "en"; render(); });
      document.getElementById("langNl").addEventListener("click", function () { lang = "nl"; render(); });

      render();
    </script>
  </body>
</html>
