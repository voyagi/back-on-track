<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Back on Track: back pain self-help</title>
    <meta name="description" content="A simple self-help toolkit for people with ongoing low back pain." />
    <meta name="theme-color" content="#1565c0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Back on Track" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <button class="back-btn" id="back" aria-label="Back to home">←</button>
        <h1 id="title" class="brand">Back on Track</h1>
        <button class="lang-btn" id="langBtn">NL</button>
      </header>

      <main>
        <div id="screen" class="screen" aria-live="polite"></div>
      </main>

      <nav class="tabbar" aria-label="Main">
        <a href="#/home" data-tab="home"><span class="nav-code">H</span><span class="tl">Home</span></a>
        <a href="#/today" data-tab="today"><span class="nav-code">M</span><span class="tl">Move</span></a>
        <a href="#/learn" data-tab="learn"><span class="nav-code">L</span><span class="tl">Learn</span></a>
        <a href="#/goal" data-tab="goal"><span class="nav-code">G</span><span class="tl">Goal</span></a>
      </nav>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="content.js"></script>
    <script src="exercise-anim.js"></script>
    <script src="app.js"></script>
  </body>
</html>
